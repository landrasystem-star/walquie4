<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie Talkie - WAV Automático</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #2c2c3e;
            border-radius: 40px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            color: #ff6b6b;
            text-align: center;
            margin: 0 0 20px;
            font-size: 1.8rem;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input {
            background: #0a0a0f;
            border: 1px solid #3a3a4a;
            color: white;
            text-align: center;
        }

        button {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .id-box {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            text-align: center;
            margin: 10px 0;
            word-break: break-all;
            color: #2ed573;
            font-size: 12px;
        }

        .ptt {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(#e74c3c, #c0392b);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            text-align: center;
        }

        .ptt:active {
            transform: scale(0.95);
        }

        .ptt.listening {
            background: radial-gradient(#34495e, #2c3e50);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 0.85rem;
            background: #1e1e2a;
            padding: 8px;
            border-radius: 20px;
        }

        .manos-libres {
            background: #3498db;
            margin-top: 10px;
        }

        .manos-libres.activo {
            background: #e67e22;
        }

        .alarma {
            background: #e74c3c;
        }

        .botonera {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-wav {
            background: #e67e22;
            margin-top: 10px;
            font-size: 1.1rem;
            padding: 14px;
        }

        .spinner {
            display: none;
            text-align: center;
            margin-top: 10px;
            padding: 8px;
            background: #2c3e50;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .info-wav {
            background: #0a0a0f;
            border-radius: 10px;
            padding: 8px;
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #ffb347;
            font-family: monospace;
        }

        .estado-wav {
            background: #1e1e2a;
            border-radius: 10px;
            padding: 5px;
            margin-top: 5px;
            font-size: 10px;
            color: #2ed573;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📻 WALKIE TALKIE</h1>
    
    <input type="text" id="username" placeholder="Tu nombre">
    <div class="id-box" id="myId">Esperando ID...</div>
    
    <input type="text" id="otherId" placeholder="ID de la otra persona">
    <button id="connect">🔗 CONECTAR</button>
    
    <div class="botonera">
        <div id="ptt" class="ptt listening">🎤<br>PTT<br><span style="font-size:0.6rem;">Mantener</span></div>
        <button id="manosLibres" class="manos-libres">🔊 MANOS LIBRES (OFF)</button>
        <button id="alarmaBtn" class="alarma">🚨 TIMBRE</button>
        <button id="wavBtn" class="btn-wav">🔊 ENVIAR sonido.wav</button>
    </div>
    
    <div class="spinner" id="spinner">🎵 Enviando sonido.wav al otro walkie...</div>
    <div class="info-wav" id="infoWav">
        💡 El archivo <strong>sonido.wav</strong> se envía automáticamente<br>
        🔇 Tú NO lo escuchas, solo el otro walkie
    </div>
    <div class="estado-wav" id="estadoWav">📁 Cargando sonido.wav...</div>
    
    <div class="status" id="status">📡 Desconectado</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    // ============================================
    // WALKIE TALKIE - CORREGIDO
    // ============================================
    
    let peer = null;
    let localStream = null;
    let call = null;
    let audioRemoto = null;
    let connected = false;
    let manosLibresActivo = false;
    let miNombre = '';
    let wavBuffer = null;  // Guardar el WAV
    let wavCargado = false;
    
    // DOM elements
    const usernameInput = document.getElementById('username');
    const myIdDiv = document.getElementById('myId');
    const otherIdInput = document.getElementById('otherId');
    const connectBtn = document.getElementById('connect');
    const ptt = document.getElementById('ptt');
    const manosLibresBtn = document.getElementById('manosLibres');
    const alarmaBtn = document.getElementById('alarmaBtn');
    const wavBtn = document.getElementById('wavBtn');
    const statusSpan = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const infoWav = document.getElementById('infoWav');
    const estadoWav = document.getElementById('estadoWav');
    
    function mostrarMensaje(texto, esError = false) {
        statusSpan.innerHTML = texto;
        if (esError) {
            setTimeout(() => {
                if (connected) statusSpan.innerHTML = '✅ Conectado';
                else statusSpan.innerHTML = '📡 Desconectado';
            }, 3000);
        }
    }
    
    // ========== CARGAR sonido.wav ==========
    async function cargarWav() {
        try {
            estadoWav.innerHTML = '📁 Buscando sonido.wav...';
            const response = await fetch('sonido.wav');
            if (!response.ok) {
                throw new Error('No se encontró el archivo sonido.wav');
            }
            const arrayBuffer = await response.arrayBuffer();
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            wavBuffer = await audioContext.decodeAudioData(arrayBuffer);
            wavCargado = true;
            const tamañoKB = (arrayBuffer.byteLength / 1024).toFixed(1);
            estadoWav.innerHTML = `✅ sonido.wav cargado (${tamañoKB} KB)`;
            infoWav.innerHTML = `✅ <strong>sonido.wav</strong> listo (${tamañoKB} KB)<br>🔇 Se enviará directamente al otro walkie - Tú NO lo oyes`;
            return true;
        } catch(err) {
            console.error(err);
            estadoWav.innerHTML = `❌ No se encontró sonido.wav - Ponlo en la misma carpeta`;
            infoWav.innerHTML = `⚠️ No se encuentra <strong>sonido.wav</strong><br>💡 Pon tu archivo en la misma carpeta con ese nombre`;
            wavCargado = false;
            return false;
        }
    }
    
    // ========== ENVIAR WAV AL OTRO WALKIE (VERSIÓN SIMPLE Y FIABLE) ==========
    async function enviarWavAlOtro() {
        if (!connected) {
            mostrarMensaje('⚠️ Conecta primero al otro walkie', true);
            return;
        }
        
        if (!wavCargado || !wavBuffer) {
            mostrarMensaje('❌ sonido.wav no está cargado', true);
            return;
        }
        
        spinner.style.display = 'block';
        wavBtn.disabled = true;
        
        try {
            // Guardar el estado actual del micrófono
            const micEstabaActivo = localStream ? localStream.getAudioTracks()[0]?.enabled : false;
            
            // Activar micrófono si no lo está
            if (localStream && !localStream.getAudioTracks()[0]?.enabled) {
                localStream.getTracks().forEach(t => t.enabled = true);
            }
            
            // Crear un Audio element para reproducir el WAV
            // El WAV se reproduce localmente y el micrófono lo captura
            // Esta es la forma MÁS SIMPLE y FIABLE de enviar sonidos
            
            // Convertir AudioBuffer a Blob para reproducirlo
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const sampleRate = wavBuffer.sampleRate;
            const length = wavBuffer.length;
            const channels = wavBuffer.numberOfChannels;
            
            // Crear WAV desde el AudioBuffer
            const wavBlob = audioBufferToWav(wavBuffer);
            const url = URL.createObjectURL(wavBlob);
            
            const audio = new Audio(url);
            audio.volume = 1.0;
            
            mostrarMensaje(`🎵 Enviando sonido.wav al otro walkie...`);
            infoWav.innerHTML = `🎵 Reproduciendo <strong>sonido.wav</strong> - El otro walkie lo escucha`;
            
            // Reproducir (se capturará con el micrófono)
            await audio.play();
            
            // Esperar a que termine
            await new Promise(resolve => {
                audio.onended = resolve;
            });
            
            // Limpiar
            URL.revokeObjectURL(url);
            
            // Restaurar estado del micrófono
            if (localStream && !micEstabaActivo && !manosLibresActivo) {
                localStream.getTracks().forEach(t => t.enabled = false);
            }
            
            mostrarMensaje(`✅ sonido.wav enviado al otro walkie`);
            infoWav.innerHTML = `✅ <strong>sonido.wav</strong> reproducido en el otro dispositivo (tú no lo oíste)`;
            
            setTimeout(() => {
                spinner.style.display = 'none';
                wavBtn.disabled = false;
                if (connected) mostrarMensaje('✅ Conectado');
                infoWav.innerHTML = `✅ <strong>sonido.wav</strong> listo<br>🔇 Se enviará directamente al otro walkie`;
            }, 2000);
            
        } catch(err) {
            console.error('Error:', err);
            mostrarMensaje(`❌ Error: ${err.message}`, true);
            spinner.style.display = 'none';
            wavBtn.disabled = false;
            infoWav.innerHTML = `❌ Error al enviar: ${err.message}`;
        }
    }
    
    // Convertir AudioBuffer a WAV Blob
    function audioBufferToWav(buffer) {
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1; // PCM
        const bitDepth = 16;
        
        let samples = buffer.getChannelData(0);
        let dataLength = samples.length * 2;
        let bufferLength = 44 + dataLength;
        const arrayBuffer = new ArrayBuffer(bufferLength);
        const view = new DataView(arrayBuffer);
        
        // Escribir cabecera WAV
        writeString(view, 0, 'RIFF');
        view.setUint32(4, bufferLength - 8, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
        view.setUint16(32, numChannels * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeString(view, 36, 'data');
        view.setUint32(40, dataLength, true);
        
        // Escribir datos
        let offset = 44;
        for (let i = 0; i < samples.length; i++) {
            const sample = Math.max(-1, Math.min(1, samples[i]));
            const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
            view.setInt16(offset, intSample, true);
            offset += 2;
        }
        
        return new Blob([arrayBuffer], { type: 'audio/wav' });
    }
    
    function writeString(view, offset, str) {
        for (let i = 0; i < str.length; i++) {
            view.setUint8(offset + i, str.charCodeAt(i));
        }
    }
    
    // ========== TIMBRE LOCAL ==========
    function sonarTimbreLocal() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.6);
            osc.stop(audioCtx.currentTime + 0.6);
            audioCtx.resume();
        } catch(e) {}
    }
    
    // ========== PEERJS ==========
    peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
    
    peer.on('open', id => {
        myIdDiv.innerHTML = `📱 TU ID: ${id}<br>📛 ${miNombre || 'Sin nombre'}`;
        mostrarMensaje('✅ Listo. Comparte este ID');
    });
    
    peer.on('call', incoming => {
        if (localStream) {
            incoming.answer(localStream);
            configurarLlamada(incoming);
        }
    });
    
    peer.on('error', err => {
        console.error(err);
        mostrarMensaje('❌ Error de conexión', true);
    });
    
    // Micrófono
    navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: true, noiseSuppression: true }
    })
    .then(stream => { 
        localStream = stream;
        localStream.getTracks().forEach(t => t.enabled = false);
        mostrarMensaje('🎤 Micrófono listo');
    })
    .catch(e => { 
        mostrarMensaje('❌ Permiso de micrófono denegado', true); 
    });
    
    function configurarLlamada(c) {
        call = c;
        connected = true;
        mostrarMensaje('✅ Conectado - Escuchando');
        
        c.on('stream', stream => {
            if (audioRemoto) audioRemoto.pause();
            audioRemoto = new Audio();
            audioRemoto.srcObject = stream;
            audioRemoto.autoplay = true;
        });
        
        c.on('close', () => {
            connected = false;
            mostrarMensaje('❌ Desconectado');
            if (manosLibresActivo) {
                manosLibresActivo = false;
                manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
                manosLibresBtn.classList.remove('activo');
            }
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT';
        });
    }
    
    // ========== UI ==========
    
    connectBtn.onclick = () => {
        const otherId = otherIdInput.value.trim();
        if (!otherId) { alert('Escribe el ID del otro walkie'); return; }
        if (!localStream) { alert('Esperando micrófono...'); return; }
        mostrarMensaje('🔄 Conectando...');
        const c = peer.call(otherId, localStream);
        configurarLlamada(c);
    };
    
    usernameInput.onchange = () => {
        miNombre = usernameInput.value.trim();
        if (miNombre && peer && peer.id) {
            myIdDiv.innerHTML = `📱 TU ID: ${peer.id}<br>📛 ${miNombre}`;
        }
    };
    
    // PTT
    ptt.onmousedown = () => {
        if (connected && localStream && !manosLibresActivo) {
            localStream.getTracks().forEach(t => t.enabled = true);
            ptt.classList.remove('listening');
            ptt.innerHTML = '🔴<br>HABLANDO';
            mostrarMensaje('🔴 Transmitiendo...');
        }
    };
    ptt.onmouseup = () => {
        if (!manosLibresActivo && localStream) {
            localStream.getTracks().forEach(t => t.enabled = false);
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT';
            mostrarMensaje('🎧 Escuchando');
        }
    };
    ptt.onmouseleave = ptt.onmouseup;
    ptt.ontouchstart = (e) => { e.preventDefault(); ptt.onmousedown(); };
    ptt.ontouchend = (e) => { e.preventDefault(); ptt.onmouseup(); };
    
    // Manos libres
    manosLibresBtn.onclick = () => {
        if (!connected) { alert('Conecta primero'); return; }
        manosLibresActivo = !manosLibresActivo;
        if (manosLibresActivo) {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = true);
            manosLibresBtn.innerHTML = '🎙️ MANOS LIBRES (ON)';
            manosLibresBtn.classList.add('activo');
            mostrarMensaje('🎤 Manos libres activado');
        } else {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
            manosLibresBtn.classList.remove('activo');
            mostrarMensaje('🎧 Modo PTT');
        }
    };
    
    // Alarma
    alarmaBtn.onclick = () => {
        if (!connected) {
            alert('No estás conectado');
            return;
        }
        sonarTimbreLocal();
        mostrarMensaje('🚨 ¡TIMBRE ENVIADO!');
    };
    
    // Botón enviar WAV
    wavBtn.onclick = async () => {
        await enviarWavAlOtro();
    };
    
    // Inicializar - cargar el WAV al inicio
    cargarWav();
    
    usernameInput.value = 'WalkieUser';
    miNombre = 'WalkieUser';
    
    window.onbeforeunload = () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    };
</script>
</body>
</html>
